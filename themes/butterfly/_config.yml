# --------------------------------------
# 美化 / 效果
# --------------------------------------

# 自定义主题颜色
# 注意：颜色值必须用双引号括起，例如“#000”，否则可能会导致错误！

theme_color:
  enable: true # 是否启用主题颜色，true 表示启用，false 表示禁用
  main: "#ecbac7" # 主要主题颜色，用于页面背景、按钮等元素
  paginator: "#ecbac7" # 分页器颜色，用于分页按钮等
  button_hover: "#FF7242" # 按钮悬停颜色，鼠标悬停时按钮的颜色
  text_selection: "#00c4b6" # 文本选择颜色，用于用户选中文本时的背景颜色
  link_color: "#fc6f94" # 链接颜色，用于超链接文本的颜色
  meta_color: "#858585" # 元数据颜色，用于日期、作者等元数据的颜色
  hr_color: "#A4D8FA" # 分隔线颜色，用于水平分隔线的颜色
  code_foreground: "#F47466" # 代码前景色，用于代码文本的前景颜色
  code_background: "rgba(27, 31, 35, .05)" # 代码背景色，用于代码块的背景颜色
  toc_color: "#00c4b6" # 目录颜色，用于文档目录的颜色
  blockquote_padding_color: "#ecbac7" # 引用块填充颜色，用于引用块的填充颜色
  blockquote_background_color: "#ecbac7" # 引用块背景颜色，用于引用块的背景颜色
  scrollbar_color: "#ecbac7" # 滚动条颜色，用于滚动条的颜色
  meta_theme_color_light: "ffffff" # 元主题颜色（明亮模式），用于明亮模式下的元数据颜色
  meta_theme_color_dark: "#0d0d0d" # 元主题颜色（暗黑模式），用于暗黑模式下的元数据颜色

# 类别和标签页面的用户界面设置
# 选择： 索引 - 与首页界面相同 / 默认 - 与档案界面相同
# 保持为空或索引
category_ui:
tag_ui:

# UI 元素的圆角
rounded_corners_ui: true

# 文字向两侧对齐，对最后一行无效
text_align_justify: false

# 在页眉和页脚添加蒙版
mask:
  header: true
  footer: true

# 加载动画
preloader:
  enable: true
  # source
  # 1. 全页加载
  # 2. 进度条
  source: 2
  # 进度条 主题 (see https://codebyzach.github.io/pace/)
  pace_css_url: css/barber-shop.css

# 开启网页进入效果
enter_transitions: true

# Default display mode - light (default) / dark
# 默认显示模式 - 浅色（默认）/深色
display_mode: light

# 美化文章内容的设置
beautify:
  enable: false
  # Specify the field to beautify (site or post)
  # 指定要美化的字段（网站或文章）
  field: post
  # 指定要作为标题前缀使用的图标，例如“\f0c1”
  title_prefix_icon:
  # 指定标题前缀图标的颜色，例如“#F47466”
  title_prefix_icon_color:

# 全局字体设置
# 除非您完全了解以下设置的运作原理，否则请勿对其进行修改。除非您完全了解以下设置的运作原理，否则请勿对其进行修改。
font:
  global_font_size:
  code_font_size:
  font_family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Helvetica Neue", Lato, Roboto, "PingFang SC", "Microsoft JhengHei", "Microsoft YaHei", sans-serif
  code_font_family: consolas, Menlo, "PingFang SC", "Microsoft JhengHei", "Microsoft YaHei", sans-serif

# 网站标题和副标题的字体设置
blog_title_font:
  font_link:
  font_family:

# 分隔符图标的设置
hr_icon:
  enable: true
  # 字体图标（如“\3423”）的 Unicode 值
  icon:
  icon_top:

# 打字机效果
# https://github.com/disjukr/activate-power-mode
activate_power_mode:
  enable: true
  colorful: true
  shake: false
  mobile: false

# 背景效果
# --------------------------------------

# 帆布丝带
# See: https://github.com/hustcc/ribbon.js
canvas_ribbon:
  enable: true
  # 丝带的尺寸
  size: 150
  # 丝带的不透明度（0 ~ 1）
  alpha: 0.6
  zIndex: -1
  click_to_change: true
  mobile: false

# 飘动的丝带
canvas_fluttering_ribbon:
  enable: true
  mobile: false

# 画布巢
# https://github.com/hustcc/canvas-nest.js
canvas_nest:
  enable: false
  # 线条颜色，默认值：“0,0,0”；RGB 值：(R,G,B)。（注意：请使用“，”进行分隔。）
  color: "0,0,255"
  # 线条的不透明度（0~1）
  opacity: 0.7
  # 背景的 z-index 属性
  zIndex: -1
  # 线条的数量
  count: 99
  mobile: false

# 鼠标点击效果：烟花
fireworks:
  enable: true
  zIndex: 9999
  mobile: false

# 鼠标点击效果：心形符号
click_heart:
  enable: false
  mobile: false

# 鼠标点击效果：文字
clickShowText:
  enable: false
  text:
    # - I
    # - LOVE
    # - YOU
  fontSize: 15px
  random: false
  mobile: false

# --------------------------------------
# 灯箱设置
# --------------------------------------

# 选择：fancybox / medium_zoom
# https://github.com/francoischalifour/medium-zoom
# https://fancyapps.com/fancybox/
# 如果不需要灯箱，请留空
lightbox: fancybox

# --------------------------------------
# 标签插件设置
# --------------------------------------

# 相似文章
series:
  enable: true
  # 按标题或日期排序
  orderBy: "title"
  # 排序方式。1 表示升序排列；-1 表示降序排列。
  order: 1
  number: true

# ABCJS - ABC音乐记谱插件
# https://github.com/paulrosen/abcjs
abcjs:
  enable: false
  per_page: true

# Mermaid - 绘制流程图
# https://github.com/mermaid-js/mermaid
mermaid:
  enable: true
  # 使用代码块编写 Mermaid 图表
  code_write: true
  # built-in themes: default / forest / dark / neutral
  # 内置主题：默认 / 森林 / 深色 / 中性
  theme:
    light: default
    dark: dark
  # 启用“在新标签页中打开”按钮，以便将图表显示在单独的窗口中。
  open_in_new_tab: true
  # 在图表上启用缩放和平移交互
  zoom_pan: true

# chartjs
# see https://www.chartjs.org/docs/latest/
chartjs:
  enable: false
  # 除非您了解其工作原理，否则请勿修改。
  # 默认设置仅在未指定 Markdown 语法时使用。
  # 图表的通用字体颜色
  fontColor:
    light: "rgba(0, 0, 0, 0.8)"
    dark: "rgba(255, 255, 255, 0.8)"
  # 图表的一般边框颜色
  borderColor:
    light: "rgba(0, 0, 0, 0.1)"
    dark: "rgba(255, 255, 255, 0.2)"
  # 雷达图和极坐标面积图中刻度标签的背景颜色
  scale_ticks_backdropColor:
    light: "transparent"
    dark: "transparent"

# Note - Bootstrap 提示框
note:
  # 注：标签样式值说明：
  #  - simple    旧版的 bs-callout 样式，即警告样式。默认设置。
  #  - modern    新版的 bs-callout 样式（v2-v3），类似于 Mozilla 或 StackOverflow 上的样式。
  #  - flat      带有背景的扁平式标签样式。
  #  - disabled  禁用所有与标签相关的 CSS 样式导入。
  style: modern
  icons: true
  border_radius: 3
  # 对背景的偏移量（以百分比表示）在现代和扁平风格中有所不同（现代风格：-12 | 12；扁平风格：-18 | 6）。
  # 这一选项也适用于标签标签变量。此选项可在禁用注释标签的情况下使用。
  light_bg_offset: 0

# --------------------------------------
# 其他设置
# --------------------------------------

# https://github.com/MoOx/pjax
pjax:
  enable: true
  # 将指定的页面排除在 pjax 之外，例如“/music/”
  exclude:
