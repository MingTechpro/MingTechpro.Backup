# --------------------------------------
# Hexo Butterfly主题配置
# 如果您有任何疑问，请查阅相关文档。
# 中文: https://butterfly.js.org/
# 英语: https://butterfly.js.org/en/
# --------------------------------------

# --------------------------------------
# 导航设置
# --------------------------------------

nav:
  # 导航栏标志图片
  logo:
  display_title: true
  display_post_title: true
  # Whether to fix navigation bar
  fixed: false

menu:
  首页: /#content-inner || fas fa-home
  时间轴: /archives/ || fas fa-archive
  标签: /tags/ || fas fa-tags
  分类: /categories/ || fas fa-folder-open
  清单||fa fa-heartbeat:
    数据图表: /datachart/ || fas fa-chart-pie
    壁纸墙: /wallpaper/ || fas fa-image
    摄影日记: /photographicDiary/ || fas fa-camera
    书签: /bookmark/ || fas fa-book
  友链: /link/ || fas fa-link
  关于: /about/ || fas fa-heart

# --------------------------------------
# 代码块设置
# --------------------------------------

code_blocks:
  # 代码块主题: darker / pale night / light / ocean / false
  theme: darker
  macStyle: true
  # 代码块高度限制（单位：像素 xp）
  height_limit: false
  word_wrap: true

  # 工具栏
  copy: true
  language: true
  # true: 缩小代码块 | false: 展开代码块 | none: 展开代码块并隐藏按钮
  shrink: false
  fullpage: false

# 社交媒体链接
# Formal:
#   icon: link || the description || color
# 格式
#   图标：链接 || 描述性文字 || 颜色
social:
  fab fa-github: https://github.com/MingTechpro || Github || '#000'
  fas fa-tv: https://space.bilibili.com/210154480 || BiliBili || '#000'
  fas fa-rss: /feed.xml || RSS || '#000'
  fas fa-envelope: mailto:ChenPeiming52001@163.com || Email || '#000'

# --------------------------------------
# 图像设置
# --------------------------------------
# 网站图标
favicon: /img/favicon.svg

# 网站头像
avatar:
  img: /img/mingtechpr-icon.jpg
  effect: false

# 禁用所有横幅图片
disable_top_img: false

# 如果页面横幅未设置， 它将显示默认顶图
default_top_img: https://cdn.jsdmirror.com/gh/MingTechpro/drawing-bed/wallpaper/202405271047026.jpg

# 首页的横幅图片
index_img: https://cdn.jsdmirror.com/gh/MingTechpro/drawing-bed/wallpaper/20260307000153595.jpg

# 存档页的横幅图片
archive_img:

# 注意：这是标签页面，而不是标签列表页面
tag_img:

# 标签页面的横幅图片， 你可以为每个标签设置横幅图片
# Format:
#  - tag name: xxxxx
# 格式:
#  - 标签名称: xxxxx
tag_per_img:

# 注意：这是分类页面，而不是分类列表页面
category_img:

# 分类页面的横幅图片，您可以为每个类别设置横幅图片
# Format:
#  - category name: xxxxx
# 格式:
#  - 分类名称: xxxxx
category_per_img:

# 页脚的背景图片
footer_img: false

# 网站背景
# 可以将其设置为颜色， 图片 URL 或包含颜色的数组以及或图片网址
# 如果提供了数组，每次加载时将从该数组中随机选择一个背景。
background:

cover:
  # 是否禁用封面
  index_enable: true
  aside_enable: true
  archives_enable: true
  # 当封面未设置时，显示默认封面
  default_cover:
    - https://cdn.jsdmirror.com/gh/MingTechpro/drawing-bed/wallpaper/202505292002686.jpg

# 替换损坏的图片
error_img:
  flink: /img/tiger-friend_404.gif
  post_page: /img/404.jpg

# 一个简单的404页面
error_404:
  enable: false
  subtitle: "页面未找到"
  background: /img/error-page.png

post_meta:
  # 主页
  page:
    # Choose: created / updated / both
    # 选择：已创建 / 已更新 / 两者
    date_type: created
    # Choose: date / relative
    #选择：日期 / 亲属
    date_format: date
    categories: true
    tags: true
    label: true
  post:
    # Choose: left / center
    # 选择：左 / 中
    position: left
    # Choose: created / updated / both
    # 选择：已创建 / 已更新 / 两者
    date_type: both
    # Choose: date / relative
    # 选择：日期 / 亲属
    date_format: date
    categories: true
    tags: true
    label: true

# --------------------------------------
# 索引页面设置
# --------------------------------------

# 首页的 top_img 设置
# default: top img - full screen, site info - middle
# 默认：顶部图片 - 全屏，站点信息 - 中间
# The position of site info, eg: 300px/300em/300rem/10%
# 网站信息的位置，例如：300px/300em/300rem/10%
index_site_info_top:
# top_img 的高度，例如：300px/300em/300rem
index_top_img_height:

# 首页的副标题
subtitle:
  enable: true
  # 打字机效果
  effect: true
  # 自定义 typed.js
  # https://github.com/mattboldt/typed.js/#customization
  typed_option:
  # 来源 - 调用第三方服务 API (仅限中文)
  # 它会先显示来源，然后显示子内容。
  # Choose: false/1/2/3
  # 选择：false/1/2/3
  # false - 禁用该功能
  # 1 - hitokoto.cn
  # 2 - https://api.aa1.cn/doc/yiyan.html
  # 3 - jinrishici.com
  source: false
  # 如果您关闭了打字机效果，那么副标题将仅显示子标题的第一行内容。
  sub:
    - 人性的背后是白云苍狗 · 愿你我都是生活的高手
    - 过去无可挽回 · 未来可以改变

# 首页文章布局
# 1：左侧为封面，右侧为信息
# 2：右侧为封面，左侧为信息
# 3：封面和信息在左右两侧交替排列
# 4：封面在上方，信息在下方
# 5：信息显示在封面之上
# 6：马赛克式布局 - 封面在上方，信息在下方
# 7：马赛克式布局 - 封面显示信息
index_layout: 3

# 在首页显示文章简介
# 1：描述
# 2：两者皆可（如果存在描述，则显示描述，否则显示自动摘要）
# 3：自动摘要（默认）
# false：不显示文章简介
index_post_content:
  method: 2
  # 如果你将方法设置为2或3，长度需要配置
  length: 500

# --------------------------------------
# 帖子设置
# --------------------------------------

toc:
  post: true
  page: false
  number: true
  expand: false
  # Only for post
  style_simple: false
  scroll_percent: true

post_copyright:
  enable: true
  decode: false
  author_href:
  license: CC BY-NC-SA 4.0
  license_url: https://creativecommons.org/licenses/by-nc-sa/4.0/

# 赞助/奖励
reward:
  enable: true
  text:
  QR_code:
    - img: https://cdn.jsdmirror.com/gh/MingTechpro/drawing-bed/avatar-bg_url/202405051708051.jpg
      link:
      text: 微信赞赏
    - img: https://cdn.jsdmirror.com/gh/MingTechpro/drawing-bed/avatar-bg_url/202405051710278.jpg
      link:
      text: 支付宝

# 编辑帖子
# 轻松在线浏览和编辑博客源代码。
post_edit:
  enable: false
  # url: https://github.com/user-name/repo-name/edit/branch-name/subdirectory-name/
  # For example: https://github.com/jerryc127/butterfly.js.org/edit/main/source/
  url:

# 相关文章
related_post:
  enable: true
  # 显示的帖子数量
  limit: 6
  # Choose: created / updated
  # 选择：已创建 / 已更新
  date_type: created

# 选择：1 / 2 / 否
# 1：“下一篇文章”将链接到旧文章
# 2：“下一篇文章”将链接到新文章
# 否：禁用分页功能
post_pagination: 2

# 显示帖子过时提示
noticeOutdate:
  enable: true
  # Style: simple / flat
  # 风格：简约 / 扁平
  style: flat
  # 显示过时提示，单位：天
  limit_day: 365
  # Position: top / bottom
  # 位置：顶部 / 底部
  position: top
  message_prev: 文章更新至今已相隔
  message_next: 天，鉴于时间较长，其中信息建议您谨慎参考，可能已不再适用。

# --------------------------------------
# 页脚设置
# --------------------------------------
footer:
  nav:
  owner:
    enable: true
    since: 2024
  # 主题和框架的版权
  copyright:
    enable: true
    version: true
  custom_text: <img src="/img/cyber-security.png" style="position:relative;top:4px;" width="20px" height="20px"/><a href="https://beian.mps.gov.cn/#/query/webSearch?code=44512202000119" rel="noreferrer" target="_blank">粤公网安备44512202000119号</a> | <a href="https://beian.miit.gov.cn/" target="_blank">粤ICP备2026022037号</a> <br> <img src="https://icp.gov.moe/favicon.ico" style="position:relative;top:4px;" width="20px" height="20px"><a href="https://icp.gov.moe/?keyword=20249006" target="_blank">萌ICP备20249006号</a> <br> All articles in this blog are licensed under <a href="https://creativecommons.org/licenses/by-nc-sa/4.0/" target="_blank">CC BY-NC-SA 4.0</a> unless stating additionally.

# --------------------------------------
# 侧边设置
# --------------------------------------

aside:
  enable: true
  hide: false
  # 显示位于右下角的隐藏侧边栏按钮
  button: true
  mobile: true
  # Position: left / right
  # 位置：左 / 右
  position: right
  display:
    archive: true
    tag: true
    category: true
  card_author:
    enable: true
    description:
    button:
      enable: true
      icon: fab fa-github
      text: Follow Me
      link: https://github.com/MingTechpro
  card_announcement:
    enable: true
    content: <img width="100%" src="https://imgapi.cn/ip.php?diy=TWluZ1RlY2hwcm8=">
    #content: 我回来了！我的键盘居然还没发芽？<br>各位父老乡亲、兄弟姐妹、不小心点进来的路人朋友们：是的，不用揉眼睛了，您没看错，也不是网页出现了时空乱流。这个几乎要被归档到“互联网考古遗址”的博客，它……它竟然更新了！
    #content: 欢迎来到 MingTechpro 的个人博客 <br> <a href="https://cdn.jsdmirror.com/gh/MingTechpro/drawing-bed/avatar-bg_url/202405061722781.png"><img width="100%" src="https://cdn.jsdmirror.com/gh/MingTechpro/drawing-bed/avatar-bg_url/202405061722781.png"></a>
  card_recent_post:
    enable: true
    # 如果设置为0，将显示全部
    limit: 5
    # Sort: date / updated
    # 排序：日期 / 更新
    sort: date
    sort_order:
  card_newest_comments:
    enable: true
    sort_order:
    limit: 6
    # 单位：分钟，将数据保存到本地存储
    storage: 10
    avatar: true
  card_categories:
    enable: true
    # 如果设置为0，将显示全部
    limit: 8
    # Choose: none / true / false
    # 选择：无 / 真 / 假
    expand: none
    sort_order:
  card_tags:
    enable: true
    # 如果设置为0，将显示全部
    limit: 40
    color: true
    custom_colors:
    # Order of tags, random/name/length
    # 标签顺序：随机/名称/长度
    orderby: random
    # 排序方式。1 表示升序排列；-1 表示降序排列。
    order: 1
    sort_order:
  card_archives:
    enable: true
    # Type: monthly / yearly
    # 类型：按月 / 按年
    type: monthly
    # Eg: YYYY年MM月
    format: MMMM YYYY
    # 排序方式。1 表示升序排列；-1 表示降序排列。
    order: -1
    # 如果设置为0，将显示全部
    limit: 8
    sort_order:
  card_post_series:
    enable: true
    # 标题显示系列名称
    series_title: false
    # 按标题(title)或日期(date)排序
    orderBy: "date"
    # 排序方式。1 表示升序排列；-1 表示降序排列。
    order: -1
  card_webinfo:
    enable: true
    post_count: true
    last_push_date: true
    sort_order:
    # 发布时间与现在的时间差
    # Formal: Month/Day/Year Time or Year/Month/Day Time
    # 格式：月/日/年 时间 或 年/月/日 时间
    # 如果您未启用此功能，请留空
    runtime_date:

# --------------------------------------
# 右下角按钮
# --------------------------------------

# 右下角按钮与底部之间的距离（默认单位 px)
rightside_bottom:

# 繁体中文与简体中文之间的转换
translate:
  enable: true
  # 按钮上的文字
  default: 繁
  # 网站的语言(1 - 繁体中文/ 2 - 简体中文）
  defaultEncoding: 2
  # 时间延迟
  translateDelay: 0
  # 当语言为简体中文时按钮的文字内容
  msgToTraditionalChinese: "繁"
  # 当语言为繁体中文时按钮的文字内容
  msgToSimplifiedChinese: "簡"

# 阅读模式
readmode: true

# 深色模式
darkmode:
  enable: true
  # 切换暗/亮模式的开关按钮
  button: true
  # 自动切换暗/亮模式
  # autoChangeMode: 1  按照系统设置操作，如果系统不支持暗模式，则会在下午 6 点至次日早上 6 点之间自动切换暗模式
  # autoChangeMode: 2  在下午 6 点至次日早上 6 点之间切换暗模式
  # autoChangeMode: false
  autoChangeMode: 1
  # 设置灯光模式开启时间。该值应在 0 到 24 之间。若未设置，则默认值为 6 和 18。
  start: 8
  end: 19

# 在回到顶部按钮中显示滚动百分比
rightside_scroll_percent: false

# 除非您完全了解其作用，否则请勿修改以下设置
# 选项：阅读模式、翻译、黑暗模式、隐藏侧边栏、目录、聊天、评论
# 不要重复相同的值
rightside_item_order:
  enable: true
  # Default: readmode,translate,darkmode,hideAside
  # 默认：阅读模式，翻译，暗模式，隐藏侧边栏
  hide: readmode,darkmode,hideAside,chat
  # Default: toc,chat,comment
  # 默认：目录,聊天,评论
  show: toc,comment,translate

# 右下角配置按钮的动画
rightside_config_animation: true

# --------------------------------------
# 全局设置
# --------------------------------------

anchor:
  # 当您滚动页面时，网址会根据头部标识进行更新。
  auto_update: false
  # 点击标题以滚动并更新锚点
  click_to_scroll: true

# 图片描述文字
photofigcaption: false

copy:
  enable: true
  # 在复制的内容后添加版权信息
  copyright:
    enable: true
    limit_count: 100

# 字数统计 需要安装 hexo-wordcount 插件
wordcount:
  enable: true
  # 在文章元信息中显示文章字数
  post_wordcount: true
  # 在文章元信息中显示阅读时间
  min2read: true
  # 在侧边栏的网站信息中显示总字数
  total_wordcount: true

# Busuanzi 统计网站的 PV/UV
busuanzi:
  site_uv: true
  site_pv: true
  page_pv: true

# --------------------------------------
# 数学
# --------------------------------------

# 关于“每页显示数量”
# 如果将其设置为“true”，则会在每个页面中加载 MathJax/Katex 脚本
# 如果将其设置为“false”，则会根据您的设置来加载 MathJax/Katex 脚本（在页面的前置内容中添加“mathjax: true”或“katex： true”即可）
math:
  # Choose: mathjax, katex
  # 选择：MathJax、KaTeX
  # 如果不需要数学，请保持为空
  use:
  per_page: true
  hide_scrollbar: true

  mathjax:
    # 启用上下文菜单
    enableMenu: true
    # 选择: all / ams / none, 这决定了方程式是否需要编号以及编号的方式。这决定了方程式是否需要编号以及编号的方式。
    tags: none

  katex:
    # 启用复制 KaTeX 公式
    copy_tex: false

# --------------------------------------
# 搜索
# --------------------------------------

search:
  # 选择：algolia_search / local_search / docsearch
  # 如果不需要搜索，请保持为空
  use: local_search
  placeholder:

  # Algolia 搜索
  algolia_search:
    # 每页搜索结果数量
    hitsPerPage: 6

  # 本地搜索
  local_search:
    # 页面加载时预加载搜索数据。
    preload: false
    # 按文章显示前 n 个结果，将“全部”选项设为 -1 则会显示所有结果
    top_n_per_article: 1
    # 将 HTML 字符串转义为可读的形式。
    unescape: false
    # 为搜索结果启用分页
    pagination:
      enable: true
      # 每页搜索结果数量
      hitsPerPage: 6
    CDN:

  # 文档搜索
  # https://docsearch.algolia.com/
  docsearch:
    appId:
    apiKey:
    indexName:
    option:

# --------------------------------------
# 分享系统
# --------------------------------------

share:
  # 选择：sharejs / addtoany
  # 如果不需要分享，请保持为空
  use: sharejs

  # Share.js
  # https://github.com/overtrue/share.js
  sharejs:
    sites: facebook,twitter,wechat,weibo,qq

  # AddToAny
  # https://www.addtoany.com/
  addtoany:
    item: facebook,x,wechat,sina_weibo,facebook_messenger,email,copy_link

# --------------------------------------
# 评论系统
# --------------------------------------

comments:
  # 最多可设置两个评论系统，第一个将作为默认显示
  # 如果不需要评论，请留空
  # 选择：Disqus/Disqusjs/Livere/Gitalk/Valine/Waline/Utterances/Facebook Comments/Twikoo/Giscus/Remark42/Artalk
  # 两个评论系统的格式：Disqus，Waline
  use: Waline,关闭
  # 在按钮旁显示评论名称
  text: true
  # 动态加载：评论系统将在评论元素进入浏览器视口时进行加载。
  # 如果您将其设置为“true”，则评论数量将无效。
  lazyload: false
  # 在帖子顶图中显示评论数量
  count: true
  # 在主页显示评论数
  card_post_count: false

# Disqus 渲染注释
# https://disqus.com/
disqus:
  shortname:
  # 用于最新评论小工具
  apikey:

# 替代 Disqus - 通过 Disqus API 渲染评论
# https://github.com/SukkaW/DisqusJS
disqusjs:
  shortname:
  apikey:
  option:

# Livere (來必力)
# https://www.livere.com/
livere:
  uid:

# Gitalk
# https://github.com/gitalk/gitalk
gitalk:
  client_id:
  client_secret:
  repo:
  owner:
  admin:
  option:

# Valine
# https://valine.js.org
valine:
  appId:
  appKey:
  avatar: monsterid
  # 此配置适用于国内自定义域名用户，海外版本将自动识别（无需手动填写）
  serverURLs:
  bg:
  # 使用 Valine 访客数作为页面浏览量
  visitor: false
  option:

# Waline - 一个带有后端支持的简单评论系统，源自 Valine 系统。
# https://waline.js.org/
waline:
  serverURL: https://waline.MingTechpro.top/
  bg: /img/waline_bg.png
  # 使用 Waline 页面访问量作为页面浏览量
  pageview: false
  option:
    emoji:
      [
        "https://unpkg.com/@waline/emojis@1.2.0/bmoji",
        "https://unpkg.com/@waline/emojis@1.2.0/bilibili",
        "https://unpkg.com/@waline/emojis@1.2.0/weibo",
      ]
    lang: "zh-CN"
    locale:
      placeholder: |
        💬欢迎评论~
        💌本站已启用邮箱通知功能哦，若您想要接收通知，那么请正确输入邮箱以及昵称哟~
        👾本站已开启QQ邮箱自动设置QQ头像功能~
        🔏本站已启用Akismet反垃圾评论哟~
        🚀评论和回复支持标准M↓

# Utterances
# https://utteranc.es/
utterances:
  repo:
  # 问题映射：pathname/url/title/og:title
